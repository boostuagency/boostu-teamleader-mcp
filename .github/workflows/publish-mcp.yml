name: Publish to MCP Registry

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for GitHub OIDC (proves boostuagency org ownership)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: curl -sL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher

      - name: Login via GitHub OIDC
        run: ./mcp-publisher login github-oidc

      - name: Publish to the MCP Registry
        run: ./mcp-publisher publish
